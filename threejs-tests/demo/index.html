<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Demo - Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        #info {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 5px;
            font-size: 15px;
            z-index: 50;
            max-width: 350px;
        }

        #info h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
        }

        #info p {
            margin: 8px 0;
            line-height: 1.5;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/",
                "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.18/+esm"
            }
        }
    </script>
</head>

<body>
    <div id="info">
        <h3>Démo Interaction Arbre</h3>
        <p><strong>Contrôles:</strong></p>
        <p>🖱️ Survolez les branches pour les mettre en évidence</p>
        <p>🖱️ Cliquez sur les branches pour les supprimer</p>
        <p>🟢 Les points verts indiquent les points de coupe</p>
        <p>🖱️ Clic du milieu pour déplacer la caméra</p>
        <p>Utilisez la GUI pour ajuster les paramètres</p>
    </div>
    <script type="module" src="./main.js"></script>
</body>

</html>
